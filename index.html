<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Abysse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --pixel-font: 'Press Start 2P', cursive; }
        body { margin:0; background:#000; color:#fff; font-family:var(--pixel-font); display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; cursor:pointer; user-select:none; }
        #game-container { display:flex; flex-direction:column; align-items:center; transition:opacity 1s ease; }
        #word-display { font-size:1.5rem; margin-bottom:40px; letter-spacing:10px; }
        input { background:transparent; border:4px solid #fff; color:#fff; font-family:inherit; font-size:1.5rem; width:70px; text-align:center; padding:15px; outline:none; text-transform:uppercase; margin-bottom:20px; }
        input:disabled { border-color:#333; color:#333; cursor:not-allowed; }
        #validate-btn { background:#fff; color:#000; border:none; padding:12px 25px; font-family:var(--pixel-font); font-size:0.7rem; cursor:pointer; }
        #validate-btn:disabled { background:#333; color:#111; cursor:not-allowed; }
        #cinematic-container { display:none; width:90%; max-width:800px; text-align:center; opacity:0; transition:opacity 1s ease; }
        #scene { display:flex; justify-content:space-around; align-items:flex-end; height:220px; margin-top:20px; border-bottom:2px solid #222; padding-bottom:10px; }
        canvas { image-rendering:pixelated; transition:opacity 0.5s; }
        #dialogue-text { font-size:0.65rem; line-height:1.8; min-height:100px; padding:20px; background:rgba(255,255,255,0.05); margin-top:20px; }
        #final-screen { display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:#f5e04a; z-index:100; overflow:hidden; }
        #ismac-bg { position:absolute; inset:0; background:#f5e04a; opacity:0; transition:opacity 0.8s ease; }
        #pixel-grid { position:absolute; inset:0; display:grid; pointer-events:none; }
        .px-cell { background:#000; transition:opacity 0.45s ease; }
        #logo-wrapper { position:relative; z-index:10; opacity:0; transform:scale(0.75); transition:opacity 0.9s ease, transform 0.9s cubic-bezier(0.34,1.56,0.64,1); }
        #logo-wrapper img { max-width:min(580px,88vw); display:block; }
        #logo-wrapper.visible { opacity:1; transform:scale(1); }
        @keyframes float { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1) translateY(-18px)} }
        #logo-wrapper.floating { animation:float 3.5s ease-in-out infinite; }
        #reset-btn { position:fixed; bottom:5px; left:5px; background:transparent; border:none; color:#050505; font-size:0.3rem; z-index:200; cursor:pointer; }
        #already-played { display:none; font-size:0.55rem; color:#555; margin-top:15px; line-height:2; text-align:center; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="word-display">_ _ _ _ _</div>
        <input type="text" id="letter-input" maxlength="1" placeholder="?" autocomplete="off">
        <button id="validate-btn">VALIDER</button>
        <div id="game-message" style="margin-top:20px;font-size:0.6rem;color:#ff4444;height:20px;"></div>
        <div id="already-played">TU AS D&Eacute;J&Agrave; JOU&Eacute;.<br>UN APPAREIL = UNE LETTRE.</div>
    </div>
    <div id="cinematic-container">
        <div id="speaker" style="font-size:0.5rem;color:#555;text-transform:uppercase;letter-spacing:3px;"></div>
        <div id="scene">
            <canvas id="sharkCanvas"></canvas>
            <canvas id="crocoCanvas"></canvas>
        </div>
        <div id="dialogue-text"></div>
        <div style="font-size:0.4rem;color:#333;margin-top:10px;">( CLIQUE POUR CONTINUER )</div>
    </div>

        <div id="pixel-grid"></div>

        /* ── Device ID ── */
        function getDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) { id = 'dev_' + Math.random().toString(36).substr(2,12) + '_' + Date.now().toString(36); localStorage.setItem('deviceId', id); }
            return id;
        }
        const DEVICE_ID = getDeviceId();

        function lockDevice() { set(ref(db, "devices/" + DEVICE_ID), true); }
        function checkDeviceLock(cb) {
            
            get(ref(db, "devices/" + DEVICE_ID)).then(snap => cb(snap.exists()));
        }
        function applyLockUI() {
            document.getElementById('letter-input').disabled = true;
            document.getElementById('validate-btn').disabled = true;
            document.getElementById('already-played').style.display = 'block';
        }

        /* ── Audio ── */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTypeSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(110, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }

        /* ── Sprites ── */
        function drawToCanvas(canvasId, spriteStr, width, height, pSize) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            canvas.width = width * pSize; canvas.height = height * pSize;
            ctx.fillStyle = "#FFF";
            spriteStr.trim().split('\n').forEach((line, y) => {
                [...line].forEach((ch, x) => { if (ch === '0') ctx.fillRect(x*pSize, y*pSize, pSize, pSize); });
            });
        }

        drawToCanvas('sharkCanvas', sharkData, 31, 19, 6);
        drawToCanvas('crocoCanvas', crocoData, 36, 40, 4);

        /* ── Script cinématique ── */
        const script = [
            {n:"gamemaster", t:"Hey"},
            {n:"son fr\u00e8re", t:"?"},
            {n:"gamemaster", t:"Ils ont enfin r\u00e9ussi les 5 \u00e9preuves."},
            {n:"son fr\u00e8re", t:"Ah ouais ? Ils en ont mis du temps dis donc."},
            {n:"gamemaster", t:"Ils l'ont fait ,mais bon faudra juste leurs dire..."},
            {n:"gamemaster", t:"Que..."},
            {n:"gamemaster", t:"Tout ça n'a servit à rien car ce que je vias leurs offrir n'a rien à voir avec ce qu'ils ont fait"},
            {n:"son fr\u00e8re", t:"C'est une blague ?"},
            {n:"gamemaster", t:"Non ,pas vraiment"},
            {n:"son fr\u00e8re", t:"Les pauvres..."},
            {n:"gamemaster", t:"Ouais... c'est parti pour : ISMAC"}
        ];

        let phase = "game", currentLine = -1, isTyping = false, solved = false;

        /* ── Firebase listener ── */
        onValue(ref(db, "mot"), snap => {
            const data = snap.val() || {};
            let count = 0;
            for (let i = 0; i < 5; i++) if (data[i]) count++;
            document.getElementById('word-display').innerText = SECRET_WORD.split('').map((c,i) => data[i] ? c : '_').join(' ');
            if (count === 5 && !solved) { solved = true; setTimeout(startCinematic, 1000); }
        });

        checkDeviceLock(played => { if (played) applyLockUI(); });

        /* ── Clic body = avancer cinéma ── */
        document.body.addEventListener('click', () => {
            if (phase === "cinema" && !isTyping) nextLine();
        });

        /* ── Bouton VALIDER ── */
        document.getElementById('validate-btn').addEventListener('click', e => {
            e.stopPropagation();
            const inp = document.getElementById('letter-input');
            const char = inp.value.toUpperCase();
            if (!char) return;
            if (SECRET_WORD.includes(char)) {
                for (let i = 0; i < 5; i++) if (SECRET_WORD[i] === char) set(ref(db, "mot/" + i), true);
                lockDevice(); applyLockUI();
            } else {
                document.getElementById('game-message').innerText = "ERREUR";
                inp.value = "";
                setTimeout(() => document.getElementById('game-message').innerText = "", 1500);
            }
        });

        document.getElementById('letter-input').addEventListener('click', e => e.stopPropagation());

        document.getElementById('reset-btn').addEventListener('click', e => {
            e.stopPropagation();
            if (confirm("Reset?")) {
                remove(ref(db, "mot"));
                remove(ref(db, "devices"));
                localStorage.clear();
                location.reload();
            }
        });

        function startCinematic() {
            phase = "cinema";
            document.getElementById('game-container').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('game-container').style.display = "none";
                const cin = document.getElementById('cinematic-container');
                cin.style.display = "block";
                setTimeout(() => cin.style.opacity = "1", 100);
                nextLine();
            }, 1000);
        }

        function nextLine() {
            currentLine++;
            if (currentLine < script.length) {
                const l = script[currentLine];
                document.getElementById('speaker').textContent = l.n;
                document.getElementById('sharkCanvas').style.opacity = (l.n === "gamemaster") ? 1 : 0.2;
                document.getElementById('crocoCanvas').style.opacity = (l.n === "son fr\u00e8re") ? 1 : 0.2;
                typeW(l.t);
            } else { showFinal(); }
        }

        function typeW(text) {
            isTyping = true; let i = 0;
            const el = document.getElementById('dialogue-text'); el.textContent = "";
            const itv = setInterval(() => {
                el.textContent += text[i]; playTypeSound(); i++;
                if (i >= text.length) { clearInterval(itv); isTyping = false; }
            }, 45);
        }

        function showFinal() {
            phase = "final";
            document.getElementById('cinematic-container').style.opacity = "0";
            setTimeout(() => {
                const fs = document.getElementById('final-screen');
                fs.style.display = "flex";
                const grid = document.getElementById('pixel-grid');
                const CELL = 28;
                const cols = Math.ceil(window.innerWidth / CELL);
                const rows = Math.ceil(window.innerHeight / CELL);
                grid.style.gridTemplateColumns = `repeat(${cols},${CELL}px)`;
                grid.style.gridTemplateRows = `repeat(${rows},${CELL}px)`;
                grid.innerHTML = "";
                const total = cols * rows;
                for (let i = 0; i < total; i++) { const c = document.createElement('div'); c.className = 'px-cell'; grid.appendChild(c); }
                const cells = grid.querySelectorAll('.px-cell');
                setTimeout(() => document.getElementById('ismac-bg').style.opacity = "1", 500);
                const indices = [...Array(total).keys()].sort(() => Math.random() - 0.5);
                const spreadMs = 1600;
                indices.forEach((idx, order) => { setTimeout(() => cells[idx].style.opacity = "0", 700 + (order/total) * spreadMs); });
                setTimeout(() => {
                    const logo = document.getElementById('logo-wrapper');
                    logo.classList.add('visible');
                    setTimeout(() => logo.classList.add('floating'), 1000);
                }, 700 + spreadMs + 300);
            }, 1000);
        }
    </script>
